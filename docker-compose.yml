version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGO_URI=mongodb://mongo:27017/otterchat
      - JWT_SECRET=${JWT_SECRET:-otterchat-change-me-in-production}
      - SERVER_URL=http://backend:3001
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - otterchat-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - '3000:3000'
    environment:
      - REACT_APP_API_URL=http://localhost:3001
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - otterchat-net

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - otterchat-net

volumes:
  mongo_data:

networks:
  otterchat-net:
    driver: bridge
