services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=production
      - PORT=3001
      - SERVER_URL=http://backend:3001
      - DIRECTORY_SERVER_URL=http://localhost:4000
      # By default point the Tor proxy to the local daemon, can be overridden per host
      - TOR_PROXY=socks5h://172.17.0.1:9050
    restart: unless-stopped
    networks:
      - otterchat-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - '3000:3000'
    environment:
      - REACT_APP_API_URL=
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - otterchat-net

networks:
  otterchat-net:
    driver: bridge
